<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7c5cfc">
  <link rel="manifest" href="manifest.json">
  <title>UZ LAND ERP</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#0f0f13;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#f0eeff;padding:20px}
    .box{text-align:center;max-width:320px}
    .icon{width:80px;height:80px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px;box-shadow:0 8px 28px rgba(124,92,252,.4)}
    .name{font-weight:800;font-size:24px;letter-spacing:3px;margin-bottom:4px}
    .sub{font-size:12px;color:#a78bfa;letter-spacing:2px;margin-bottom:28px}
    .btn{display:block;background:linear-gradient(135deg,#7c5cfc,#5b3fd4);border:none;border-radius:12px;padding:14px 24px;font-weight:700;font-size:15px;color:#fff;text-decoration:none;cursor:pointer;box-shadow:0 6px 20px rgba(124,92,252,.35);margin-bottom:12px}
    .hint{font-size:12px;color:#7a7a9a;line-height:1.6}
    .steps{background:#17171f;border:1px solid #2a2a38;border-radius:12px;padding:14px 16px;margin-top:16px;text-align:left}
    .step{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:12px;color:#a78bfa}
    .step:last-child{margin-bottom:0}
    .step-num{background:#7c5cfc;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
  </style>
</head>
<body>
<div class="box">
  <div class="icon">⚙️</div>
  <div class="name">UZ LAND</div>
  <div class="sub">ERP TIZIMI</div>
  <a class="btn" href="https://script.google.com/macros/s/AKfycbwiNoCbND7Es5sQiBHN2mEBsc0JfQBvrrl6ety4kudLMzlpLUZRtyvcIKSPgHyJr4IT/exec">
    🚀 Tizimga kirish
  </a>
  <div class="hint">Telefoningizga ilova sifatida qo'shish uchun:</div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div>Chrome da bu sahifani oching</div></div>
    <div class="step"><div class="step-num">2</div><div>⋮ menyusini bosing (yuqori o'ng)</div></div>
    <div class="step"><div class="step-num">3</div><div>"Bosh ekranga qo'shish" tanlang</div></div>
    <div class="step"><div class="step-num">4</div><div>"Qo'shish" bosing — tayyor! ✅</div></div>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
